[workspace]
members = ["cargo:."]

# Config for 'dist' (cargo-dist) — release flow in RELEASING.md
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app:
#   shell      → install.sh   (curl -fsSL https://leewayai.app/install.sh | bash)
#   powershell → install.ps1  (irm https://leewayai.app/install.ps1 | iex)
#   homebrew   → formula pushed to Leeway-AI/homebrew-tap (brew install leeway-ai/tap/leeway)
installers = ["shell", "powershell", "homebrew"]
# The Homebrew tap the formula is pushed to (needs the HOMEBREW_TAP_TOKEN secret)
tap = "Leeway-AI/homebrew-tap"
publish-jobs = ["homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# .tar.gz (not .xz/.zip) EVERYWHERE so `leeway update` (self_update +
# flate2/tar) can extract the archives — the zip crate behind self_update
# rejects cargo-dist's zip compression method ("Compression method not
# supported"). Windows 10+ ships tar.exe, so the .ps1 installer handles it.
unix-archive = ".tar.gz"
windows-archive = ".tar.gz"
# Whether to install an updater program (we ship our own `leeway update`)
install-updater = false
